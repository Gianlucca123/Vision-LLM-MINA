<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Vidéo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .video-container {
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 8px;
            background: white;
        }
        .description-box {
            height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 10px;
            background: white;
            white-space: pre-wrap;
        }
        .side-panel {
            border-right: 1px solid #ddd;
        }
    </style>
</head>
<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <!-- Sidebar -->
            <div class="col-md-3 side-panel p-3">
                <button class="btn btn-primary w-100 mb-3">+ Nouvelle analyse</button>
                <div class="mb-4">
                    <input type="text" class="form-control" placeholder="Recherche">
                </div>
                <h5>Analyses récentes</h5>
                <ul class="list-group">
                    <li class="list-group-item">Vid-452al.mp4</li>
                    <li class="list-group-item">Vid-22.mp4</li>
                    <li class="list-group-item">Vid-23.mp4</li>
                </ul>
            </div>
            
            <!-- Main content -->
            <div class="col-md-9 p-3">
                <div class="video-container mb-3">
                    <video controls width="100%">
                        <source src="{{ video_url }}" type="video/mp4">
                        Votre navigateur ne supporte pas la lecture vidéo.
                    </video>
                </div>
                <div class="description-box">
                    <h5>Descriptions</h5>
                    <p>{{ descriptions_text }}</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
